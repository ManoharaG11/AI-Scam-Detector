<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scam Detector</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">

    <div class="header">
        <h1>AI Scam Detector</h1>
        <p>Paste any message to analyze if it's a scam</p>
    </div>

    <div class="demo-messages">
        <span>Try a demo:</span>
        <div>
            <button onclick="loadDemo('scam1')">🏆 Lottery Scam</button>
            <button onclick="loadDemo('scam2')">🏦 Bank Phishing</button>
            <button onclick="loadDemo('scam3')">📦 Delivery Scam</button>
            <button onclick="loadDemo('safe1')">✅ Normal Chat</button>
            <button onclick="loadDemo('safe2')">✅ Work Email</button>
        </div>
    </div>

    <div class="input-section">
        <textarea id="message" placeholder="Paste message here..."></textarea>

        <button onclick="analyze()">Analyze Message</button>
    </div>

    <div id="result" class="result" style="display:none;">
        <h2>Result</h2>
        <p><b>Verdict:</b> <span id="verdict"></span></p>
        <p><b>Risk:</b> <span id="risk"></span></p>
        <p><b>Reason:</b> <span id="reason"></span></p>
    </div>

</div>

<script>
const API_URL = "/analyze";

const demos = {
    scam1: "Congratulations! You won $1,000,000 lottery. Click here now!",
    scam2: "Your bank account is suspended. Share OTP immediately.",
    scam3: "Delivery failed. Pay ₹50 to reschedule.",
    safe1: "Hey, are we meeting today?",
    safe2: "Please send the report by tomorrow."
};

function loadDemo(type) {
    document.getElementById("message").value = demos[type];
}

async function analyze() {
    const message = document.getElementById("message").value;

    const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    });

    const data = await res.json();

    const result = data.result;

    document.getElementById("verdict").innerText = result.verdict;
    document.getElementById("risk").innerText = result.risk;
    document.getElementById("reason").innerText = result.reason;

    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
